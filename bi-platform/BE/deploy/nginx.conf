# Cấu hình Nginx Reverse Proxy cho BI & Data Analytics Backend
# Lưu file này vào đường dẫn trên EC2: /etc/nginx/sites-available/bi-backend

server {
    listen 80;
    listen [::]:80;
    
    # THAY THẾ BẰNG TÊN MIỀN CỦA BẠN (Ví dụ: api.analytics.yourdomain.com)
    server_name api.yourdomain.com;

    # Kích thước tối đa của file upload (nếu có)
    client_max_body_size 50M;

    # Ghi nhận log truy cập và log lỗi
    access_log /var/log/nginx/bi_backend_access.log;
    error_log /var/log/nginx/bi_backend_error.log;

    # Định tuyến tất cả request đến FastAPI Container
    location / {
        proxy_pass http://127.0.0.1:8000;
        
        # Thiết lập HTTP Header chuẩn để FastAPI nhận diện đúng IP nguồn và Giao thức (HTTP/HTTPS)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cấu hình hỗ trợ Websocket (Dùng cho truyền tải dữ liệu thời gian thực)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Tăng thời gian timeout cho các API truy vấn/tính toán dữ liệu lớn
        proxy_connect_timeout 60s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Trang lỗi mặc định
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
